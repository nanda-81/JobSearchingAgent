name: PJSAP Continuous Integration

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-test:
    name: Backend Test & Lint Suite
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobsearch_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev build-essential

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install httpx pytest pytest-cov

    - name: Run Pytest Coverage Suite
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        PYTHONPATH: "backend"
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/jobsearch_test"
      run: |
        pytest backend/tests/ --cov=backend/app --cov-report=term-missing --cov-fail-under=70

  frontend-build:
    name: Frontend Build & Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Node.js v20
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: "npm"
        cache-dependency-path: frontend/package.json

    - name: Install Frontend Packages
      run: |
        cd frontend
        npm ci

    - name: Compile and Build Production Bundle
      run: |
        cd frontend
        npm run build

  docker-validate:
    name: Docker Image Build Validation
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Validate Backend Docker Build
      run: |
        docker build -t pjsap-backend:latest ./backend

    - name: Validate Frontend Docker Build
      run: |
        docker build -t pjsap-frontend:latest ./frontend
